name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: sportcation-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Validate deployment secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project and production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx --yes vercel@54.11.1 pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes vercel@54.11.1 env pull .env.production.local --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Migrate and verify production database
        env:
          NODE_ENV: production
        run: |
          npm run db:migrate
          npm run deploy:check

      - name: Build production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@54.11.1 build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production artifact
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOYMENT_URL="$(npx --yes vercel@54.11.1 deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify health endpoint
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$DEPLOYMENT_URL/api/health"; then
              exit 0
            fi
            sleep 5
          done
          exit 1
